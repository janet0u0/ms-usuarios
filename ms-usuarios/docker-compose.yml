services:
  mysql-usuarios:
    image: mysql:8.0
    container_name: mysql-ms-usuarios
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: grupo_cordillera
    ports:
      - "3306:3306"
    volumes:
      - mysql_usuarios_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_usuarios_data: