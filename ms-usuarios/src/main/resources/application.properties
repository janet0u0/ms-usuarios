spring.application.name=ms-usuarios
server.port=8081

# =============================================
# Configuracion MySQL con Docker
# Ejecutar primero: docker-compose up -d
# =============================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/grupo_cordillera?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true